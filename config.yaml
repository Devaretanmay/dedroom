# DedrooM — unified configuration
# One file controls both loop detection and context compression.

loop_detection:
  enabled: true
  max_repeats: 3
  history_window: 8
  strictness: balanced        # lenient | balanced | strict
  count_mode: all              # all | errors_only

  adaptive:
    enabled: true
    error_reduction: 1
    min_repeats: 2

  volatile_fields:
    auto_inference: true
    min_occurrences: 2
    configured:
      - tool: search
        fields: ["request_id", "timestamp"]
      - tool: read_file
        fields: ["offset"]

  semantic:
    enabled: false
    similarity_threshold: 0.85
    window: 5
    embedder: auto

  tools:
    - name: write_file
      max_repeats: 2
      count_mode: errors_only

  rules:
    - tool: execute_command
      type: exact
      value: '{"command": "rm -rf /"}'
      on_match: block

compression:
  enabled: true
  content_router:
    detection: [magika, parser, regex]
    max_input_tokens: 100000
    append_only: true
  compressors:
    smart_crusher: true
    code_compressor: true
    log_compressor: true
    text_compressor: false
  cache_aligner:
    enabled: true
  ccr:
    backend: memory            # memory | sqlite | redis
    ttl_seconds: 1800
    shared_with_loop_detection: true

loop_compression_coupling:
  enabled: true
  on_detected:
    compression_budget: aggressive
    inject_hint: false
  on_error_loop:
    compression_budget: maximum
    inject_hint: true
    hint_template: "You are looping on '{tool}'. Try a different approach."
  on_recovery:
    compression_budget: moderate
    fresh_context_window: 3

memory:
  enabled: false
  backend: sqlite-vec
  embedder: fastembed
